<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire Atlas | New Tech 채용시장 인사이트 보드</title>
    <meta
      name="description"
      content="New Tech 채용시장의 흐름을 읽고, 지원자와 업계 사이의 이해관계 간극을 좁혀갑니다. 또 채용시장에 쌓인 요건을 바탕으로, 다음 기회를 더 구체적으로 기획하도록 돕는 인사이트 보드입니다."
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css?v=20260412semantic16" />
  </head>
  <body class="intro-active">
    <div id="site-intro" class="site-intro" aria-hidden="true">
      <div class="site-intro-stage" aria-hidden="true">
        <div class="site-intro-scene">
          <span class="site-intro-grid"></span>
          <span class="site-intro-plane"></span>
          <span class="site-intro-noise"></span>
          <span class="site-intro-caustic"></span>
          <span class="site-intro-orb orb-a"></span>
          <span class="site-intro-orb orb-b"></span>
          <span class="site-intro-wire wire-a"></span>
          <span class="site-intro-wire wire-b"></span>
          <span class="site-intro-ribbon ribbon-a"></span>
          <span class="site-intro-ribbon ribbon-b"></span>
          <span class="site-intro-glint glint-a"></span>
          <span class="site-intro-glint glint-b"></span>
          <span class="site-intro-particle particle-a"></span>
          <span class="site-intro-particle particle-b"></span>
          <span class="site-intro-particle particle-c"></span>
        </div>
      </div>
      <div class="site-intro-copy">
        <p class="site-intro-kicker">Hire Atlas</p>
        <p class="site-intro-title">인사이트 인터페이스를 렌더링하고 있어요</p>
      </div>
    </div>
    <main class="app-shell">
      <section class="content">
        <header class="topbar">
          <div class="topbar-copy brand-hero">
            <div class="brand-lockup" aria-label="Hire Atlas">
              <span class="brand-mark" aria-hidden="true">
                <span class="brand-mark-sheet brand-mark-sheet-back"></span>
                <span class="brand-mark-sheet brand-mark-sheet-mid"></span>
                <span class="brand-mark-sheet brand-mark-sheet-front"></span>
                <span class="brand-mark-pin"></span>
              </span>
              <div class="brand-copy-block">
                <p class="brand-kicker">New Tech 채용시장</p>
                <h1 class="brand-title">Hire Atlas</h1>
              </div>
            </div>
            <p class="brand-description">
              New Tech 채용시장의 흐름을 읽고, 지원자와 업계 사이의 이해관계 간극을 좁혀갑니다.
              또 채용시장에 쌓인 요건을<br />바탕으로, 다음 기회를 더 구체적으로 기획하도록 돕는
              인사이트 보드입니다.
            </p>
          </div>
          <div class="topbar-actions">
            <div class="topbar-actions-main">
              <div id="role-resume-slot" class="topbar-action-slot topbar-action-slot-resume" aria-hidden="true">
                <button
                  id="open-role-resume-guides"
                  type="button"
                  class="action-visual-button action-visual-button-resume"
                  hidden
                  aria-disabled="true"
                  disabled
                >
                  <span class="action-visual-art action-visual-resume" aria-hidden="true">
                    <span class="action-resume-sheet action-resume-sheet-back"></span>
                    <span class="action-resume-sheet action-resume-sheet-mid"></span>
                    <span class="action-resume-sheet action-resume-sheet-front"></span>
                    <span class="action-resume-line action-resume-line-a"></span>
                    <span class="action-resume-line action-resume-line-b"></span>
                    <span class="action-resume-dot"></span>
                  </span>
                  <span class="action-visual-copy">
                    <span class="action-visual-label">시장 목표 이력서</span>
                    <span class="action-visual-note">AI 문서 생성</span>
                  </span>
                </button>
              </div>
              <button
                id="sync-sheet"
                type="button"
                class="action-visual-button action-visual-button-sync action-visual-button-icononly"
                aria-label="데이터 반영"
                title="데이터 반영"
              >
                <span class="action-visual-art action-visual-sync" aria-hidden="true">
                  <svg class="action-sync-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true">
                    <circle class="action-sync-track" cx="14" cy="14" r="10.5" />
                    <circle class="action-sync-spinner" cx="14" cy="14" r="10.5" pathLength="100" />
                    <path
                      class="action-sync-arc"
                      pathLength="100"
                      d="M22.69 9.4A10.5 10.5 0 1 0 24.08 20.6"
                    />
                    <g class="action-sync-head">
                      <path d="M18.78 9.32H22.9V5.2" />
                    </g>
                  </svg>
                </span>
              </button>
            </div>
            <details class="actions-popover">
              <summary aria-label="관리 열기">
                <span class="action-visual-art action-visual-manage" aria-hidden="true">
                  <span class="action-manage-track action-manage-track-a"></span>
                  <span class="action-manage-track action-manage-track-b"></span>
                  <span class="action-manage-knob action-manage-knob-a"></span>
                  <span class="action-manage-knob action-manage-knob-b"></span>
                </span>
              </summary>
              <div class="actions-menu">
                <div class="actions-row">
                  <button id="run-missing" type="button">누락 정리</button>
                  <button id="refresh-board" type="button">새로고침</button>
                  <button id="run-all" type="button">전체 재정리</button>
                </div>
                <div class="actions-divider" aria-hidden="true"></div>
                <p class="actions-section-title">모델 설정</p>
                <div class="tool-grid">
                  <label class="field field-wide">
                    <span>Base URL</span>
                    <input id="base-url" type="text" />
                  </label>
                  <label class="field">
                    <span>Model</span>
                    <input id="model-name" type="text" />
                  </label>
                  <label class="field">
                    <span>API Key</span>
                    <input id="api-key" type="password" autocomplete="off" />
                  </label>
                  <label class="field">
                    <span>Batch Size</span>
                    <input id="batch-size" type="number" min="1" max="20" value="4" />
                  </label>
                  <button id="save-config" type="button" class="ghost-button">설정 저장</button>
                </div>
              </div>
            </details>
          </div>
        </header>

        <section class="board-header" aria-label="보드 상태">
          <div>
            <p id="overview-text"></p>
          </div>
          <p id="status-text" class="status-text" aria-live="polite">보드 준비 완료</p>
        </section>

        <section class="filters-card">
          <div class="filters-head">
            <div>
              <p class="filters-eyebrow">View Control</p>
              <h3>읽기 기준</h3>
            </div>
            <div class="filters-meta">
              <div class="persona-toggle" id="activity-tabs">
                <button type="button" class="persona-card" data-activity-filter="all">
                  <span class="persona-copy">
                    <span class="persona-title">전체 보기</span>
                    <span class="persona-message">닫힌 공고까지 포함해 흐름을 함께 읽습니다.</span>
                  </span>
                </button>
                <span class="persona-divider" aria-hidden="true">||</span>
                <button type="button" class="persona-card active" data-activity-filter="active">
                  <span class="persona-copy">
                    <span class="persona-title">활성만</span>
                    <span class="persona-message">지금 열려 있는 공고만 빠르게 집중해서 봅니다.</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
          <div id="role-tabs" class="role-filter-tabs"></div>
        </section>

        <section class="board-card">
          <div id="semantic-bundles" class="semantic-bundles"></div>
          <div id="field-sections" class="field-sections"></div>
        </section>
      </section>
    </main>

    <div id="cluster-drawer-shell" class="cluster-drawer-shell" aria-hidden="true">
      <button id="cluster-drawer-scrim" type="button" class="cluster-drawer-scrim" aria-label="패널 닫기"></button>
      <aside id="cluster-drawer-panel" class="cluster-drawer-panel" aria-label="군집 공고 목록">
        <div id="cluster-drawer-content" class="cluster-drawer-content"></div>
      </aside>
    </div>

    <div id="role-resume-shell" class="role-resume-shell" aria-hidden="true">
      <button id="role-resume-scrim" type="button" class="role-resume-scrim" aria-label="이력서 패널 닫기"></button>
      <section id="role-resume-panel" class="role-resume-panel" aria-label="시장 기준 목표 이력서">
        <div id="role-resume-content" class="role-resume-content"></div>
      </section>
    </div>

    <div id="company-hover-popover" class="company-hover-popover" aria-hidden="true">
      <p id="company-hover-label" class="company-hover-label"></p>
      <div id="company-hover-body" class="company-hover-body" aria-hidden="true">
        <p id="company-hover-headline" class="company-hover-headline"></p>
        <div id="company-hover-paragraphs" class="company-hover-paragraphs"></div>
        <ul id="company-hover-signals" class="company-hover-signals"></ul>
      </div>
      <div id="company-hover-loading" class="company-hover-loading" aria-hidden="true">
        <p id="company-hover-loading-copy" class="company-hover-loading-copy"></p>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <script type="module" src="./app.js?v=20260412semantic16"></script>
  </body>
</html>
